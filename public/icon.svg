<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.1)"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Círculo decorativo -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="40"/>

  <!-- Escudo -->
  <path d="M256 90 L380 145 L380 270 Q380 370 256 420 Q132 370 132 270 L132 145 Z"
        fill="url(#shield)" stroke="rgba(255,255,255,0.6)" stroke-width="8" stroke-linejoin="round"/>

  <!-- Lacre/estrela no centro do escudo -->
  <circle cx="256" cy="255" r="68" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.5)" stroke-width="5"/>

  <!-- Check mark - feito com paths simples -->
  <polyline points="214,255 244,285 302,222"
            fill="none" stroke="white" stroke-width="18"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Texto CertFlow -->
  <text x="256" y="462" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="46" font-weight="900"
        letter-spacing="2" fill="white" opacity="0.9">CERTFLOW</text>
</svg>
