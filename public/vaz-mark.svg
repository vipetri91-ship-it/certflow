<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 98 62" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="98" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#d4d8ff"/>
      <stop offset="42%"  stop-color="#6622ee"/>
      <stop offset="100%" stop-color="#00aaff"/>
    </linearGradient>
  </defs>
  <!-- V-A combined wave: valley (V) then peak (A) -->
  <path d="M 4,20 C 9,20 13,52 22,52 C 31,52 34,6 46,6 C 54,6 56,38 60,38"
    stroke="url(#g)" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Dot below A apex -->
  <circle cx="46" cy="58" r="4.5" fill="#6622ee"/>
  <!-- Z: top bar, diagonal, bottom bar -->
  <path d="M 70,6 L 92,6 L 70,52 L 92,52"
    stroke="url(#g)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
